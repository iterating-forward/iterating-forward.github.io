<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  {%- seo -%}
  <link rel="stylesheet" href="{{ "/assets/main.css" | relative_url }}">
  {%- feed_meta -%}
  
  <!-- Syne Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@700;800&family=Syne:wght@400;600&family=Syne+Mono&display=swap" rel="stylesheet">
  
  <style>
    body, .post-content, .page-content {
      font-family: 'Syne', -apple-system, sans-serif;
      font-weight: 400;
      line-height: 1.7;
    }
    
    h1, h2, h3, h4, h5, h6,
    .post-title, .page-title, .site-title,
    .post-link {
      font-family: 'Albert Sans', sans-serif;
      font-weight: 800;
    }
    
    .site-title, .footer-heading {
      font-weight: 700;
    }
    
    code, pre, .highlight code {
      font-family: 'Syne Mono', monospace;
    }
    
    .post-content h2 {
      margin-top: 2em;
    }
  </style>
</head>
